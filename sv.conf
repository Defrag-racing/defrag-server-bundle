# Required server informations
SV_BASE_HOSTNAME=""
SV_RCON=""
SV_LOCATION=""
ADMIN_NAME=""

# Optional: Contact info that will be seen in the server query.
ADMIN_MAIL=
ADMIN_IRC=
ADMIN_DISCORD=
SV_MAPBASE=
SV_HOMEPAGE=

# Server privacy
SV_PRIVATE=0 # Make server password protected (1 to enable)
SV_PASSWORD=mypassword # Password for users to enter your private server. They must set their /password cvar to enter

# The port the server will use.
# Notes:
# - If you host several servers, the port used will be incremential.
# - If you set MDD_ENABLED to 1, change the ports as well.
SERVER_STARTPORT=27960

# Server counts
mixed_count=1
cpm_count=0
vq3_count=0
fastcaps_count=0
teamruns_count=0
freestyle_count=0

# Suffixes for server types
mixed_sfx="^7mixed^3"
cpm_sfx="^7cpm^3"
vq3_sfx="^7vq3^3"
fastcaps_sfx="^7fastcaps^3"
teamruns_sfx="^7teamruns^3"
freestyle_sfx="^7freestyle^3"

# Set MDD_ENABLED to 1 to enable MDD support (modules). 
# Notes: 
# - This REQUIRES RSID per servers to make it work - Check https://defrag.racing for more info.
# - Furthermore, it will require a "mysqlconnection.info" file in the defrag folder to work.
# - If the default port is changed, the variable names must be reflected with the new port number.
# - The value must NOT be set to 0, otherwise the server won't start.
#
# You can add as many entries as needed, as you follow this format:
# rs<PORT>=<rs_id>
#
MDD_ENABLED=0
rs27960=0
rs27961=0
rs27962=0
rs27963=0
rs27964=0
rs27965=0

# Set DEMO_SFTP_ENABLED to 1 to enable demo uploading through SFTP.
#
# Notes:
# - If you were provided a RSID (https://defrag.racing), this step is REQUIRED for proving runs made online.
# - Dockerless users will have to add an entry to their crontab file.
# - Please refer to README.md for more information about how to set this up.
DEMO_SFTP_ENABLED=0
DEMO_SFTP_HOST=
DEMO_SFTP_PORT=
DEMO_SFTP_USER=
DEMO_SFTP_PASS=
DEMO_SFTP_REMOTEDIR=